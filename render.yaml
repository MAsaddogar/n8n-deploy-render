# Use this Blueprint to deploy n8n on Render as a web
# service that uses an external Postgres database (like Supabase)
# to store workflow data for a fully free setup.

services:
  - type: web
    plan: free
    runtime: image
    name: n8n-service
    image:
      url: docker.io/n8nio/n8n:latest
    
    # Environment variables for n8n
    envVars:
      - key: N8N_ENCRYPTION_KEY
        generateValue: true
      
      # Database connection details (User will provide these from Supabase)
      - key: DB_TYPE
        value: postgresdb
      - key: DB_POSTGRESDB_DATABASE
        sync: false
      - key: DB_POSTGRESDB_HOST
        sync: false
      - key: DB_POSTGRESDB_PORT
        value: 5432
      - key: DB_POSTGRESDB_USER
        sync: false
      - key: DB_POSTGRESDB_PASSWORD
        sync: false
      
      # Webhook URL (User should update this after deployment)
      - key: WEBHOOK_URL
        value: https://your-n8n-service.onrender.com/
